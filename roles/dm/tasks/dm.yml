--- 
- name: Create dm directories
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ dm_uname }}"
    group: "{{ dm_group }}"
    mode: '755'
    state: directory
    recurse: true
  loop:
    - "{{ dm_directory_working }}"
    - "{{ dm_directory_bin }}"
    - "{{ dm_directory_logs }}"
    - "{{ dm_directory_params }}"
    - "{{ dm_directory_pids }}"

#- name: Copy dm parameter files
#  ansible.builtin.copy:
#    src: "{{ item }}"
#    dest: "{{ dm_directory_params }}"
#    owner: "{{ dm_uname }}"
#    group: "{{ dm_group }}"
#    mode: '644'
#  with_fileglob:
#    - "{{ dm_src_params }}/*"
 # notify: dm restart

- name: Create the dm.conf file
  ansible.builtin.template:
    src: "{{ dm_src_params }}/dm.conf.j2"
    dest: "{{ dm_directory_params }}/dm.conf"
    owner: "{{ dm_uname }}"
    group: "{{ dm_group }}"
    mode: '644'
 # notify: dm restart

- name: Create the dm run script
  ansible.builtin.template:
    src: "{{ dm_src_bin }}/run_dm.sh.j2"
    dest: "{{ dm_directory_bin }}/run_dm.sh"
    owner: "{{ dm_uname }}"
    group: "{{ dm_group }}"
    mode: '755'
  #notify: dm restart
