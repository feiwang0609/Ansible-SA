---
- name: Add the dm.service
  ansible.builtin.template:
    src: "{{ dm_version }}/dm.service.j2"
    dest: /etc/systemd/system/dm.service
  notify: dm restart

- name: Make sure that dm is started
  ansible.builtin.service:
    name: dm
    state: started
    enabled: true
    daemon_reload: yes
